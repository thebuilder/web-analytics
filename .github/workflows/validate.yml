name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  client:
    name: Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/TheBuilder.WebAnalytics/Client
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Test client
        run: corepack pnpm test

      - name: Build client
        run: corepack pnpm build

  dotnet:
    name: .NET (Umbraco ${{ matrix.umbraco-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        umbraco-version:
          - 17.1.0
          - 18.0.0
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Test package
        run: dotnet test tests/TheBuilder.WebAnalytics.Tests/TheBuilder.WebAnalytics.Tests.csproj -p:UmbracoVersion=${{ matrix.umbraco-version }}

      - name: Build example
        run: dotnet build samples/TheBuilder.WebAnalytics.Example/TheBuilder.WebAnalytics.Example.csproj -p:UmbracoVersion=${{ matrix.umbraco-version }}
